<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大分県柔道連盟 文書起案システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>大分県柔道連盟　文書起案システム</h1>

    <!-- 下書きエリア -->
    <div class="draft-layout">
      <div class="draft-left">
        <div class="draft-tools">
          <input id="draftNo" type="text" placeholder="下書き番号">
          <button id="saveDraftBtn" type="button">下書き保存</button>
          <button id="listDraftBtn" class="listBtn" type="button">下書き一覧</button>
        </div>

        <div class="draft-note">
          下書きはスプレッドシートに保存されます。添付ファイルは下書きには含まれません。
        </div>
      </div>

      <div class="draft-right">
        <div class="sheetDraftArea">
          <div class="sheetDraftTitle">下書き一覧</div>
          <div id="draftSheetList" class="sheetDraftList">読み込み中...</div>
        </div>
      </div>
    </div>

    <hr>

    <!-- 最初に見せるのは区分だけ -->
    <div class="field">
      <label for="type">区分</label>
      <select id="type" required>
        <option value="">選択してください</option>
        <option value="shishutsu">支出負担行為</option>
        <option value="shuunyuu">収入行為</option>
        <option value="ringi">稟議行為</option>
      </select>
    </div>

    <!-- 区分選択後に表示 -->
    <div id="kouRow" class="five-row">
      <div class="field">
        <label for="kou">項</label>
        <input id="kou" type="text">
      </div>

      <div class="field">
        <label for="moku">目</label>
        <input id="moku" type="text">
      </div>

      <div class="field">
        <label for="setsu">節</label>
        <input id="setsu" type="text">
      </div>

      <div class="field">
        <label for="seiriNo">整理番号</label>
        <input
          id="seiriNo"
          type="text"
          placeholder="例：1"
          inputmode="numeric"
          pattern="[1-9][0-9]*"
          maxlength="6"
          required
        >
      </div>
    </div>

    <div id="titleRowWrap" class="title-row">
      <div class="field">
        <label for="common_title">件名</label>
        <input id="common_title" type="text">
      </div>

      <div class="field">
        <label for="common_writer">記載者氏名</label>
        <input id="common_writer" type="text">
      </div>
    </div>

    <div id="contentWrap">
      <label for="common_content">内容</label>
      <textarea id="common_content" rows="4"></textarea>
    </div>

    <!-- 支出 -->
    <div id="form_shishutsu" style="display:none;">
      <div id="moneyRowShishutsu" class="quad">
        <div class="field">
          <label for="s_amount">支出金額</label>
          <input id="s_amount" type="number">
        </div>

        <div class="field">
          <label for="s_payee">支払先</label>
          <input id="s_payee" type="text">
        </div>

        <div class="field">
          <label for="s_method">支払方法</label>
          <select id="s_method">
            <option value="口座振込">口座振込</option>
            <option value="現金">現金</option>
          </select>
        </div>

        <div class="field">
          <label for="s_date">支出年月日</label>
          <input id="s_date" type="text" placeholder="例：2026/03/08">
        </div>
      </div>
    </div>

    <!-- 収入 -->
    <div id="form_shuunyuu" style="display:none;">
      <div id="moneyRowShuunyuu" class="quad">
        <div class="field">
          <label for="r_amount">収入金額</label>
          <input id="r_amount" type="number">
        </div>

        <div class="field">
          <label for="r_payer">納入者</label>
          <input id="r_payer" type="text">
        </div>

        <div class="field">
          <label for="r_method">受取方法</label>
          <select id="r_method">
            <option value="口座振込">口座振込</option>
            <option value="現金">現金</option>
          </select>
        </div>

        <div class="field">
          <label for="r_date">収納年月日</label>
          <input id="r_date" type="text" placeholder="例：2026/03/08">
        </div>
      </div>
    </div>

    <!-- 稟議 -->
    <div id="form_ringi" style="display:none;">
      <div id="ringiWrap"></div>
    </div>

    <div id="fileWrap">
      <label for="fileOne">ファイル添付（最大5） / 1件ずつ追加</label>
      <div class="file-row">
        <input id="fileOne" type="file">
        <button id="addFileBtn" type="button" class="addBtn">添付を追加</button>
        <button id="clearFilesBtn" type="button" class="deleteBtn">添付を全削除</button>
      </div>
      <ul id="fileList" class="fileList"></ul>
    </div>

    <div id="actionWrap" class="action-row">
      <button id="sendBtn" type="button">送信</button>
      <button id="clearBtn" type="button" class="secondary">クリア</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
